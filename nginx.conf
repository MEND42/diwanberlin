# Nginx vhost for Cafe Diwan — diwanberlin.com
# Deploy to: /etc/nginx/sites-available/diwanberlin
# Then: ln -s /etc/nginx/sites-available/diwanberlin /etc/nginx/sites-enabled/diwanberlin
# Then: nginx -t && systemctl reload nginx
#
# VPS-SOP.md §7 compliant:
#   - HTTP → HTTPS redirect
#   - HSTS, X-Frame-Options, X-Content-Type-Options
#   - All security headers via snippet
#   - Static frontend served from /var/www/diwanberlin
#   - Backend API proxied from 127.0.0.1:3001
#   - WebSocket (Socket.IO) proxied correctly

server {
    listen 80;
    listen [::]:80;
    server_name diwanberlin.com www.diwanberlin.com;

    # Allow certbot challenges
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Redirect all HTTP to HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name diwanberlin.com www.diwanberlin.com;

    # SSL — paths populated by certbot
    ssl_certificate     /etc/letsencrypt/live/diwanberlin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diwanberlin.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (CSP lives in the snippet per SOP §7)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 20M;

    # ── Static Frontend ─────────────────────────────────────────────────────
    root /var/www/diwanberlin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Long-term cache for fingerprinted assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Sitemap & robots — short cache
    location ~* \.(xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Block admin panel from being proxied (it's served statically)
    # Admin panel is accessible at /admin.html — no special block needed

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ── Socket.IO WebSocket ──────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ── Uploads ─────────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 20M;
        include /etc/nginx/snippets/security-headers.conf;
    }

    access_log /var/log/nginx/diwanberlin-access.log;
    error_log  /var/log/nginx/diwanberlin-error.log warn;
}
