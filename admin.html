<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe Diwan Berlin - Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin/css/tokens.css">
<link rel="stylesheet" href="admin/css/shells.css">
<script>
  // Redirect all traffic to admin-v2
  window.location.href = '/admin-v2' + window.location.pathname.replace('/admin.html', '').replace('/admin/', '/') || '/';
</script>
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;">
    <p>Wird weitergeleitet zu admin-v2...</p>
  </div>
</body>
</html>
<body class="auth-shell theme-paper">
  <main class="auth-card">
    <div class="auth-brand">
      <img src="uploads/diwan-logo-new.png" alt="Cafe Diwan Berlin">
      <div>
        <p>Operations Suite</p>
        <h1>Cafe Diwan Berlin</h1>
      </div>
    </div>

    <form id="login-form" class="auth-form">
      <label>
        Benutzername
        <input type="text" id="username" autocomplete="username" required>
      </label>
      <label>
        Passwort
        <input type="password" id="password" autocomplete="current-password" required>
      </label>
      <button class="primary-action" type="submit">Anmelden</button>
      <p id="login-error" class="form-error" hidden>Falsche Zugangsdaten</p>
    </form>

    <div class="auth-routes" aria-label="Admin apps">
      <span>Service</span>
      <span>Küche</span>
      <span>Management</span>
    </div>
  </main>

  <script type="module">
    import { login, getSession, routeForSession, saveSession } from './admin/js/core.js';
    import { pulse } from './admin/js/haptics.js';

    const existing = getSession();
    if (existing?.token) {
      location.replace(routeForSession(existing));
    }

    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.getElementById('login-error');
      error.hidden = true;
      try {
        const session = await login({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        });
        saveSession(session);
        pulse('success');
        location.replace(routeForSession(session));
      } catch (err) {
        error.textContent = err.message || 'Login fehlgeschlagen';
        error.hidden = false;
        pulse('error');
      }
    });
  </script>
</body>
</html>
