<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#180e04">
  <title>Kellner rufen · Cafe Diwan Berlin</title>
  <style>
    :root {
      --bg: #180e04;
      --panel: #241306;
      --gold: #c8922a;
      --gold-2: #efc66a;
      --cream: #fff4df;
      --muted: #c9b99b;
      --line: rgba(200, 146, 42, .22);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(200, 146, 42, .18), transparent 32rem),
        linear-gradient(180deg, #201105 0%, var(--bg) 100%);
      color: var(--cream);
    }

    main {
      width: min(100% - 32px, 420px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .38);
      text-align: center;
    }

    img {
      width: 174px;
      height: 98px;
      object-fit: contain;
      filter: drop-shadow(0 12px 22px rgba(0, 0, 0, .36));
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold-2);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 12vw, 58px);
      line-height: .96;
      letter-spacing: 0;
    }

    .label {
      min-height: 22px;
      margin: 8px 0 28px;
      color: var(--muted);
      font-size: 15px;
    }

    button {
      position: relative;
      width: 100%;
      min-height: 76px;
      border: 0;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: #160d04;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 18px 44px rgba(200, 146, 42, .28);
      touch-action: manipulation;
    }

    button:disabled {
      opacity: .55;
      box-shadow: none;
    }

    .status {
      min-height: 44px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .status strong { color: var(--cream); }

    .error {
      color: #ffb4a8;
    }

    @media (prefers-reduced-motion: no-preference) {
      main { animation: enter .42s cubic-bezier(.2, .8, .2, 1); }
      button:not(:disabled):active { transform: scale(.98); }
      @keyframes enter {
        from { opacity: 0; transform: translateY(14px) scale(.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="/uploads/diwan-logo-transparent.png" alt="Cafe Diwan Berlin">
    <p class="eyebrow">Cafe Diwan Berlin</p>
    <h1 id="title">Tisch</h1>
    <p class="label" id="label"></p>
    <button id="callButton" type="button" disabled>Kellner rufen</button>
    <p class="status" id="status">Tisch wird geladen...</p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('t');
    const title = document.getElementById('title');
    const label = document.getElementById('label');
    const button = document.getElementById('callButton');
    const statusEl = document.getElementById('status');
    let tableNumber = null;
    let cooldownUntil = Number(localStorage.getItem(`diwan_call_cooldown_${token}`) || 0);

    function setStatus(message, isError = false) {
      statusEl.innerHTML = message;
      statusEl.classList.toggle('error', isError);
    }

    function updateCooldown() {
      const remaining = Math.max(0, Math.ceil((cooldownUntil - Date.now()) / 1000));
      if (!remaining) {
        button.disabled = !tableNumber;
        button.textContent = 'Kellner rufen';
        return;
      }
      button.disabled = true;
      button.textContent = `Bitte warten (${remaining}s)`;
      window.setTimeout(updateCooldown, 1000);
    }

    async function loadTable() {
      if (!token) {
        setStatus('Ungültiger QR-Code.', true);
        return;
      }

      try {
        const res = await fetch(`/api/public/table/${encodeURIComponent(token)}`);
        if (!res.ok) throw new Error('invalid');
        const data = await res.json();
        tableNumber = data.tableNumber;
        title.textContent = `Tisch ${data.tableNumber}`;
        label.textContent = data.label || '';
        setStatus('Tippen Sie auf den Button, wenn Sie Service benötigen.');
        updateCooldown();
      } catch {
        setStatus('Dieser QR-Code ist nicht gültig.', true);
      }
    }

    async function callWaiter() {
      button.disabled = true;
      try {
        const res = await fetch(`/api/public/table/${encodeURIComponent(token)}/call`, { method: 'POST' });
        if (!res.ok) throw new Error('failed');
        cooldownUntil = Date.now() + 60_000;
        localStorage.setItem(`diwan_call_cooldown_${token}`, String(cooldownUntil));
        setStatus('<strong>Ihr Kellner kommt gleich.</strong><br>Bitte bleiben Sie am Tisch.');
        if (navigator.vibrate) navigator.vibrate([20, 60, 20]);
        updateCooldown();
      } catch {
        setStatus('Der Ruf konnte nicht gesendet werden. Bitte versuchen Sie es erneut.', true);
        button.disabled = false;
      }
    }

    button.addEventListener('click', callWaiter);
    loadTable();
  </script>
</body>
</html>
